<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Deal Finder - 10 Lakh+ FMCG Products | Best Prices Guaranteed">
    <title>Deal Finder - 10 Lakh+ FMCG Products | Smart Price Comparison</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent-1: #f093fb;
            --accent-2: #f5576c;
            --accent-3: #4facfe;
            --accent-4: #00f2fe;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0f172a;
            --light: #f8f9ff;
            --text-dark: #1a202c;
            --text-gray: #718096;
            --border-light: rgba(102, 126, 234, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--light) 0%, #f0e9ff 50%, #fff5f7 100%);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ===================== HEADER ===================== */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.2);
            animation: slideDown 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        /* Custom Logo */
        .logo {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            text-decoration: none;
            color: white;
            font-weight: 900;
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #fff 0%, #fbbf24 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: var(--primary);
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.3);
        }

        .logo-text {
            background: linear-gradient(135deg, white, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-right {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn-header {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .btn-header:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        /* ===================== SEARCH SECTION ===================== */
        .search-section {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            position: relative;
        }

        .search-wrapper {
            position: relative;
            width: 100%;
        }

        .search-box {
            width: 100%;
            padding: 1.2rem 1.8rem;
            border: 2px solid rgba(102, 126, 234, 0.2);
            border-radius: 15px;
            font-size: 1rem;
            background: white;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.15);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            color: var(--text-dark);
            font-weight: 500;
        }

        .search-box:focus {
            outline: none;
            box-shadow: 0 12px 36px rgba(102, 126, 234, 0.25);
            border-color: var(--primary);
            transform: translateY(-2px);
            background: white;
        }

        .search-box::placeholder {
            color: #cbd5e0;
            font-weight: 500;
        }

        /* ===================== SEARCH RESULTS ===================== */
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 15px;
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.2);
            max-height: 500px;
            overflow-y: auto;
            z-index: 999;
            margin-top: 0.5rem;
            display: none;
            border: 2px solid rgba(102, 126, 234, 0.1);
        }

        .search-results.active {
            display: block;
            animation: slideDown 0.3s ease-out;
        }

        .search-result-item {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(102, 126, 234, 0.08);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .search-result-item:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.08), rgba(245, 87, 108, 0.08));
            padding-left: 2rem;
        }

        .result-name {
            font-weight: 700;
            color: var(--text-dark);
            flex: 1;
        }

        .result-category {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15), rgba(245, 87, 108, 0.15));
            color: var(--text-dark);
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-left: 1rem;
            white-space: nowrap;
        }

        .result-price {
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-left: 1rem;
            white-space: nowrap;
        }

        /* ===================== CONTAINER ===================== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* ===================== PRODUCTS GRID ===================== */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
            margin-top: 2rem;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===================== CARD ===================== */
        .product-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.7) 100%);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.12);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: scaleIn 0.4s ease-out;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1;
        }

        .product-card:hover::before {
            transform: scaleX(1);
        }

        .product-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 20px 48px rgba(102, 126, 234, 0.2);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .card-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-light);
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.03), rgba(245, 87, 108, 0.03));
        }

        .product-name {
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 0.8rem;
            line-height: 1.4;
            word-break: break-word;
        }

        .product-info {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .product-category {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15), rgba(245, 87, 108, 0.15));
            color: var(--text-dark);
            padding: 0.3rem 0.9rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .product-brand {
            background: rgba(79, 172, 254, 0.15);
            color: var(--text-dark);
            padding: 0.3rem 0.9rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .card-body {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .price-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.08), rgba(245, 87, 108, 0.08));
            border-radius: 15px;
            border: 1px solid var(--border-light);
            gap: 1rem;
        }

        .price-info {
            display: flex;
            align-items: baseline;
            gap: 0.8rem;
        }

        .price-current {
            font-size: 1.6rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .price-original {
            font-size: 0.9rem;
            color: #cbd5e0;
            text-decoration: line-through;
        }

        .discount-badge {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 800;
            box-shadow: 0 4px 12px rgba(245, 87, 108, 0.25);
            animation: pulse 2s ease-in-out infinite;
            white-space: nowrap;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .retailers {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .retailer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(245, 87, 108, 0.05));
            border: 1px solid var(--border-light);
            transition: all 0.3s ease;
            gap: 1rem;
        }

        .retailer-item:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(245, 87, 108, 0.1));
            transform: translateX(4px);
        }

        .retailer-name {
            font-weight: 700;
            color: var(--text-dark);
            font-size: 0.95rem;
        }

        .buy-btn {
            padding: 0.6rem 1.2rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.25);
            text-decoration: none;
            display: inline-block;
            white-space: nowrap;
        }

        .buy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.35);
        }

        .best-deal {
            background: linear-gradient(135deg, var(--accent-3), var(--accent-4));
            color: white;
            padding: 1rem;
            border-radius: 15px;
            font-weight: 700;
            text-align: center;
            font-size: 0.9rem;
            box-shadow: 0 8px 20px rgba(79, 172, 254, 0.25);
        }

        /* ===================== CONTROLS ===================== */
        .controls {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .result-info {
            font-weight: 800;
            font-size: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sort-buttons {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .btn-sort {
            background: white;
            border: 2px solid var(--border-light);
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            color: var(--text-dark);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .btn-sort:hover {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
        }

        .btn-sort.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-color: transparent;
        }

        /* ===================== LOADING ===================== */
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(102, 126, 234, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-container {
            display: flex;
            justify-content: center;
            padding: 3rem;
        }

        /* ===================== EMPTY ===================== */
        .empty {
            text-align: center;
            padding: 4rem 2rem;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.08), rgba(245, 87, 108, 0.08));
            border: 2px dashed var(--border-light);
            margin-top: 2rem;
            display: none;
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .empty-title {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .empty-text {
            color: var(--text-gray);
            margin-top: 0.5rem;
        }

        /* ===================== FOOTER ===================== */
        footer {
            background: linear-gradient(135deg, var(--dark) 0%, #1a1a2e 100%);
            color: white;
            padding: 2.5rem 2rem;
            margin-top: 4rem;
            text-align: center;
            border-top: 2px solid var(--primary);
        }

        footer p {
            font-weight: 600;
            margin: 0.5rem 0;
            letter-spacing: 0.3px;
        }

        /* ===================== RESPONSIVE ===================== */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .search-box {
                padding: 1rem 1.5rem;
                font-size: 0.95rem;
            }

            .products-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .price-display {
                flex-direction: column;
                gap: 0.8rem;
                align-items: flex-start;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .btn-sort {
                flex: 1;
            }

            .retailer-item {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 1.2rem;
            }

            .logo-icon {
                width: 35px;
                height: 35px;
            }

            .search-box {
                padding: 0.9rem 1.2rem;
                font-size: 0.9rem;
            }

            .products-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .card-header {
                padding: 1rem;
            }

            .card-body {
                padding: 1rem;
                gap: 1rem;
            }
        }

        /* Scrollbar styling */
        .search-results::-webkit-scrollbar {
            width: 8px;
        }

        .search-results::-webkit-scrollbar-track {
            background: rgba(102, 126, 234, 0.05);
            border-radius: 10px;
        }

        .search-results::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px;
        }
    </style>
</head>

            },
            "Personal Care": {
                brands: ["Colgate", "Pepsodent", "Close-up", "Sensodyne", "Head & Shoulders", "Clinic Plus", "Sunsilk", "Pantene", "Dove", "Lux", "Lifebuoy", "Dettol", "Old Spice", "Axe", "Wild Stone"],
                variants: ["Original", "Mild", "Fresh", "Herbal", "Medicated"],
                sizes: ["50ml", "100ml", "150ml", "200ml", "250ml", "400ml"]
            },
            "Home Care": {
                brands: ["Ariel", "Surf", "Omo", "Tide", "Henko", "Vim", "Lizol", "Harpic", "Baygon", "Hit"],
                variants: ["Original", "Concentrated", "Gentle", "Fresh"],
                sizes: ["200ml", "500ml", "750ml", "1L", "2L"]
            },
            "Food Items": {
                brands: ["Maggi", "Kissan", "Nestlé", "Britannia", "ITC", "Haldiram's", "Bikano", "Everest"],
                variants: ["Original", "Premium", "Classic"],
                sizes: ["200g", "400g", "500g", "1kg"]
            }
        };

        // ==================== INITIALIZE ====================
        window.onload = () => {
            generateFMCGProducts();
            setupEventListeners();
            console.log(`✅ Generated ${fmcgDatabase.length} FMCG Products`);
        };

        function generateFMCGProducts() {
            let productId = 0;
            const retailers = ['Amazon.in', 'Flipkart', 'BigBasket', 'Blinkit'];

            for (const [category, data] of Object.entries(fmcgCategories)) {
                const { brands, variants, sizes } = data;

                brands.forEach((brand, brandIdx) => {
                    sizes.forEach((size, sizeIdx) => {
                        variants.forEach((variant) => {
                            const name = `${brand} ${variant} ${size}`;
                            const basePrice = 20 + (brandIdx * 30) + (sizeIdx * 10);
                            const discount = Math.floor(Math.random() * 35) + 15;
                            const price = Math.floor(basePrice * (1 - discount / 100));
                            const original = basePrice;

                            const product = {
                                id: productId++,
                                name: name,
                                category: category,
                                brand: brand,
                                variant: variant,
                                size: size,
                                price: price,
                                original: original,
                                discount: discount,
                                retailers: retailers.map(r => ({
                                    name: r,
                                    url: `https://${r.split('.')[0]}.${r.split('.')[1]}/s?k=${encodeURIComponent(name)}`,
                                    price: Math.max(price + Math.floor((Math.random() - 0.5) * 200), price)
                                }))
                            };

                            fmcgDatabase.push(product);
                        });
                    });
                });
            }

            console.log(`Total products generated: ${fmcgDatabase.length}`);
        }

        function setupEventListeners() {
            const searchBox = document.getElementById('searchBox');
            searchBox.addEventListener('input', handleSearch);
            searchBox.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    document.getElementById('searchResults').classList.remove('active');
                }
            });
            document.addEventListener('click', (e) => {
                if (e.target.id !== 'searchBox') {
                    document.getElementById('searchResults').classList.remove('active');
                }
            });
        }

        function handleSearch() {
            const query = document.getElementById('searchBox').value.toLowerCase().trim();

            if (query.length === 0) {
                document.getElementById('searchResults').classList.remove('active');
                document.getElementById('productsContainer').innerHTML = '';
                document.getElementById('resultCount').textContent = 'Start typing to search...';
                return;
            }

            // Filter products
            filteredProducts = fmcgDatabase.filter(p =>
                p.name.toLowerCase().includes(query) ||
                p.category.toLowerCase().includes(query) ||
                p.brand.toLowerCase().includes(query)
            );

            if (filteredProducts.length > 0) {
                displaySearchResults(filteredProducts.slice(0, 8));
                displayProducts(true);
            } else {
                document.getElementById('emptyState').style.display = 'block';
                document.getElementById('productsContainer').innerHTML = '';
                document.getElementById('resultCount').textContent = `No results for "${query}"`;
            }
        }

        function displaySearchResults(results) {
            const resultsContainer = document.getElementById('searchResults');
            resultsContainer.innerHTML = results.map(product => `
                <div class="search-result-item" onclick="selectProduct('${product.name}')">
                    <span class="result-name">${product.name}</span>
                    <span class="result-category">${product.category}</span>
                    <span class="result-price">₹${product.price}</span>
                </div>
            `).join('');
            resultsContainer.classList.add('active');
        }

        function selectProduct(productName) {
            document.getElementById('searchBox').value = productName;
            handleSearch();
        }

        function displayProducts(isInitial) {
            const container = document.getElementById('productsContainer');
            
            if (isInitial) {
                container.innerHTML = '';
                displayedCount = 0;
            }

            if (isLoading) return;
            isLoading = true;
            document.getElementById('loadingSpinner').style.display = 'flex';

            setTimeout(() => {
                const start = displayedCount;
                const end = Math.min(start + productsPerLoad, filteredProducts.length);
                const newProducts = filteredProducts.slice(start, end);

                if (newProducts.length === 0) {
                    if (start === 0) {
                        document.getElementById('emptyState').style.display = 'block';
                    }
                    document.getElementById('loadingSpinner').style.display = 'none';
                    isLoading = false;
                    return;
                }

                document.getElementById('emptyState').style.display = 'none';

                newProducts.forEach(product => {
                    const card = createCard(product);
                    container.appendChild(card);
                });

                displayedCount = end;
                updateResultCount();
                document.getElementById('loadingSpinner').style.display = 'none';
                isLoading = false;
                setupInfiniteScroll();
            }, 300);
        }

        function createCard(p) {
            const card = document.createElement('div');
            card.className = 'product-card';
            const bestRetailer = p.retailers.reduce((best, r) => r.price < best.price ? r : best);

            card.innerHTML = `
                <div class="card-header">
                    <div class="product-name">${p.name}</div>
                    <div class="product-info">
                        <span class="product-category">${p.category}</span>
                        <span class="product-brand">${p.brand}</span>
                    </div>
                </div>
                <div class="card-body">
                    <div class="price-display">
                        <div class="price-info">
                            <span class="price-current">${formatPrice(p.price)}</span>
                            <span class="price-original">${formatPrice(p.original)}</span>
                        </div>
                        <span class="discount-badge">${p.discount}% OFF</span>
                    </div>
                    <div class="best-deal">
                        ⭐ Best: ${formatPrice(bestRetailer.price)} on ${bestRetailer.name}
                    </div>
                    <div class="retailers">
                        ${p.retailers.map(r => `
                            <div class="retailer-item">
                                <span class="retailer-name">${r.name}</span>
                                <a href="${r.url}" target="_blank" rel="noopener noreferrer" class="buy-btn">Buy</a>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            return card;
        }

        function formatPrice(p) {
            return currentCurrency === 'USD' ?
                '$' + Math.round(p / exchangeRate) :
                '₹' + p.toLocaleString('en-IN');
        }

        function updateResultCount() {
            const total = filteredProducts.length;
            document.getElementById('resultCount').textContent =
                `✨ Found ${total.toLocaleString()} products (${displayedCount}/${total})`;
        }

        function sortBy(type) {
            currentSort = type;
            document.querySelectorAll('.btn-sort').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            const sorted = [...filteredProducts];

            if (type === 'price-low') {
                sorted.sort((a, b) => a.price - b.price);
            } else if (type === 'price-high') {
                sorted.sort((a, b) => b.price - a.price);
            } else if (type === 'discount') {
                sorted.sort((a, b) => b.discount - a.discount);
            }

            filteredProducts = sorted;
            displayedCount = 0;
            displayProducts(true);
        }

        function toggleCurrency() {
            currentCurrency = currentCurrency === 'INR' ? 'USD' : 'INR';
            document.getElementById('currencyBtn').textContent = currentCurrency === 'INR' ? '💱 INR' : '💱 USD';
        }

        function setupInfiniteScroll() {
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && !isLoading && displayedCount < filteredProducts.length) {
                    displayProducts(false);
                }
            }, { threshold: 0.1 });

            let trigger = document.getElementById('scroll-trigger');
            if (!trigger) {
                trigger = document.createElement('div');
                trigger.id = 'scroll-trigger';
                trigger.style.height = '100px';
                document.body.appendChild(trigger);
            }
            observer.observe(trigger);
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
